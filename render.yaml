services:
  - type: web
    name: fixmotor-api
    env: node
    plan: starter
    region: frankfurt
    repo: https://github.com/cahuala/siv-platform
    branch: main
    buildCommand: |
      # Instalar dependências na raiz (workspace)
      npm install
      # Build do pacote core primeiro
      cd packages/core && npm install && npm run build && cd ../..
      # Build da API
      cd apps/api && npm install && npm run build
    startCommand: cd apps/api && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        value: postgresql://postgres.pwmzhttyyijryupcraro:1029pedronegocioS*@aws-1-eu-west-2.pooler.supabase.com:6543/postgres?pgbouncer=true
      - key: DIRECT_URL
        value: postgresql://postgres.pwmzhttyyijryupcraro:1029pedronegocioS*@aws-1-eu-west-2.pooler.supabase.com:5432/postgres
      - key: JWT_SECRET
        value: flxmotor-prod-secret-2026-angola-oficina-mecanica-seguro-render-fixmotor
      - key: FRONTEND_URL
        value: https://fixmotor.onrender.com
      - key: BACKEND_URL
        value: https://fixmotor-api.onrender.com
      - key: SMS_PROVIDER
        value: mock
      - key: BACKUP_PROVIDER
        value: local
    healthCheckPath: /health
    
  - type: web
    name: fixmotor
    env: node
    plan: starter
    region: frankfurt
    repo: https://github.com/cahuala/siv-platform
    branch: main
    buildCommand: |
      # Instalar dependências na raiz
      npm install
      # Build do frontend
      cd apps/frontend && npm install && npm run build
    startCommand: cd apps/frontend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://fixmotor-api.onrender.com
    healthCheckPath: /
